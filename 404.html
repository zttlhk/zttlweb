<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Zenith Terra Tech Limited</title>
    <meta name="description" content="The page you are looking for could not be found. Please check the URL or contact us for assistance.">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 24px 60px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
        }
        
        .error-content {
            text-align: center;
            max-width: 600px;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: var(--color-primary);
            line-height: 1;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        
        .error-title {
            font-size: 32px;
            font-weight: 600;
            color: var(--color-gray-900);
            margin-bottom: 16px;
        }
        
        .error-message {
            font-size: 16px;
            color: var(--color-gray-600);
            margin-bottom: 32px;
        }
        
        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        @media (max-width: 767px) {
            .error-code {
                font-size: 80px;
            }
            
            .error-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="index.html">
                    <img src="images/logo.jpg" alt="Zenith Terra Tech Limited Logo" class="nav-logo">
                </a>
            </div>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About Us</a></li>
                <li><a href="products.html" class="nav-link">Products</a></li>
                <li><a href="contact.html" class="nav-link">Contact Us</a></li>
            </ul>
        </div>
    </nav>

    <!-- Error Content -->
    <main class="error-page">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-message">
                Sorry, the page you are looking for could not be found. It might have been moved, 
                deleted, or the URL may be incorrect.
            </p>
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> Back to Homepage
                </a>
                <a href="contact.html" class="btn btn-secondary">
                    <i class="fas fa-envelope"></i> Contact Us
                </a>
            </div>
        </div>
    </main>

    <!-- WhatsApp Floating Button -->
    <div class="whatsapp-float">
        <a href="https://wa.me/85269340494?text=Hi, I'm interested in your biopharmaceutical ingredients, please contact me with more details." 
           class="whatsapp-float-btn" 
           target="_blank" 
           rel="noopener noreferrer"
           aria-label="Chat on WhatsApp">
            <i class="fab fa-whatsapp"></i>
        </a>
        <span class="whatsapp-float-tooltip">Chat with us on WhatsApp</span>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Zenith Terra Tech Limited. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
